name: Integracion Continua (CI)

# Esto le dice a GitHub que ejecute este archivo cada vez que hagas un "push" a "main"
on:
  push:
    branches:
      - main

jobs:
  pruebas:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Mensaje de confirmación
        run: echo "¡El entorno técnico y el pipeline de CI/CD están configurados correctamente!"